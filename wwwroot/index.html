<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Email Tạm Thời</title>

	<!-- Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>

	<!-- Google Fonts: Inter -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

	<!-- Lucide Icons -->
	<script src="https://unpkg.com/lucide@latest"></script>

	<!-- SignalR Client -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

	<style>
		/* Custom Styles */
		body {
			font-family: 'Inter', sans-serif;
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}

		/* Glassmorphism Effect for Dark Mode */
		.glass-effect {
			background: rgba(255, 255, 255, 0.05);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		/* Custom Scrollbar */
		.custom-scrollbar::-webkit-scrollbar {
			width: 8px;
		}

		.custom-scrollbar::-webkit-scrollbar-track {
			background: transparent;
		}

		.custom-scrollbar::-webkit-scrollbar-thumb {
			background-color: rgba(255, 255, 255, 0.2);
			border-radius: 10px;
			border: 2px solid transparent;
			background-clip: content-box;
		}

			.custom-scrollbar::-webkit-scrollbar-thumb:hover {
				background-color: rgba(255, 255, 255, 0.3);
			}

		/* Light mode scrollbar */
		html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb {
			background-color: rgba(0, 0, 0, 0.2);
		}

			html:not(.dark) .custom-scrollbar::-webkit-scrollbar-thumb:hover {
				background-color: rgba(0, 0, 0, 0.3);
			}

		/* Animation for new emails */
		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(-10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.email-item-new {
			animation: fadeIn 0.5s ease-out forwards;
		}

		/* Mobile view transitions */
		.view-hidden {
			display: none !important;
		}
	</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

	<div id="app" class="min-h-screen w-full p-4 md:p-6 lg:p-8 flex flex-col items-center">

		<!-- Header -->
		<header class="w-full max-w-7xl flex justify-between items-center mb-6">
			<div class="flex items-center gap-3">
				<div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
					<i data-lucide="shield-check" class="text-white"></i>
				</div>
				<h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white">Hộp Thư Tạm Thời</h1>
			</div>
			<button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
				<i data-lucide="sun" class="block dark:hidden"></i>
				<i data-lucide="moon" class="hidden dark:block"></i>
			</button>
		</header>

		<main class="w-full max-w-7xl flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6">

			<!-- Left Panel: Controls & Inbox -->
			<div id="left-panel" class="lg:col-span-4 xl:col-span-3 flex flex-col gap-6">
				<!-- Email Address Box -->
				<section class="rounded-2xl p-5 shadow-lg glass-effect bg-white dark:bg-gray-800/50">
					<h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-3">Nhập email để theo dõi</h2>
					<div class="relative flex items-center">
						<input id="current-email" type="email" placeholder="ví dụ: user@domain.com" class="w-full bg-gray-50 dark:bg-gray-900/70 p-3 pr-12 rounded-lg font-mono text-base text-blue-500 dark:text-blue-400 border border-gray-300 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
						<button id="select-email-button" class="absolute right-1 p-2 text-gray-500 bg-gray-200 dark:bg-gray-700 hover:bg-blue-500 hover:text-white dark:hover:bg-blue-600 rounded-md transition-colors" title="Theo dõi email này">
							<i data-lucide="arrow-right-circle" class="w-5 h-5"></i>
						</button>
					</div>
				</section>

				<!-- Inbox List -->
				<section id="inbox-panel" class="flex-grow flex flex-col rounded-2xl shadow-lg glass-effect bg-white dark:bg-gray-800/50 min-h-[300px]">
					<div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700/50">
						<h2 class="font-bold text-lg">Hộp thư đến</h2>
						<span id="inbox-count" class="bg-blue-100 text-blue-800 text-xs font-medium me-2 px-2.5 py-0.5 rounded-full dark:bg-blue-900 dark:text-blue-300">0</span>
					</div>
					<div id="inbox-list" class="flex-grow p-2 space-y-2 overflow-y-auto custom-scrollbar">
						<!-- Placeholder for empty inbox -->
						<div id="empty-inbox-placeholder" class="flex flex-col items-center justify-center h-full text-center text-gray-500 dark:text-gray-400 p-8">
							<i data-lucide="mail-search" class="w-16 h-16 mb-4 text-gray-400 dark:text-gray-500"></i>
							<p class="font-semibold">Chưa có email nào</p>
							<p class="text-sm">Nhập một email và bấm nút để bắt đầu.</p>
						</div>
						<!-- Email items will be injected here by JS -->
					</div>
				</section>
			</div>

			<!-- Right Panel: Email Content -->
			<section id="content-panel" class="lg:col-span-8 xl:col-span-9 rounded-2xl shadow-lg glass-effect bg-white dark:bg-gray-800/50 flex flex-col">
				<!-- Placeholder for when no email is selected -->
				<div id="empty-content-placeholder" class="flex flex-col items-center justify-center h-full text-center text-gray-500 dark:text-gray-400 p-8">
					<i data-lucide="mail-open" class="w-20 h-20 mb-6 text-gray-400 dark:text-gray-500"></i>
					<p class="text-lg font-semibold">Chọn một email để đọc</p>
					<p class="text-sm">Nội dung email sẽ được hiển thị tại đây.</p>
				</div>

				<!-- Actual Email Content (hidden by default) -->
				<div id="email-content-view" class="hidden flex-col h-full">
					<div class="flex items-center gap-4 p-4 border-b border-gray-200 dark:border-gray-700/50">
						<button id="back-to-inbox" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors lg:hidden">
							<i data-lucide="arrow-left"></i>
						</button>
						<div class="flex-grow">
							<h3 id="email-subject" class="font-bold text-lg truncate"></h3>
							<div class="flex items-center text-sm text-gray-500 dark:text-gray-400 gap-4">
								<p>Từ: <span id="email-sender" class="font-medium"></span></p>
							</div>
						</div>
						<span id="email-timestamp" class="text-xs text-gray-400 dark:text-gray-500 flex-shrink-0"></span>
					</div>
					<div id="email-body" class="flex-grow p-6 overflow-y-auto custom-scrollbar leading-relaxed">
						<!-- Loading spinner -->
						<div id="email-body-loader" class="hidden items-center justify-center h-full">
							<i data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
						</div>
						<!-- Email body content will be injected here -->
					</div>
				</div>
			</section>

		</main>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			// --- Elements ---
			const themeToggle = document.getElementById('theme-toggle');
			const currentEmailEl = document.getElementById('current-email');
			const selectEmailButton = document.getElementById('select-email-button');
			const inboxListEl = document.getElementById('inbox-list');
			const inboxCountEl = document.getElementById('inbox-count');
			const emptyInboxPlaceholder = document.getElementById('empty-inbox-placeholder');

			const leftPanel = document.getElementById('left-panel');
			const contentPanel = document.getElementById('content-panel');
			const emptyContentPlaceholder = document.getElementById('empty-content-placeholder');
			const emailContentView = document.getElementById('email-content-view');
			const backToInboxBtn = document.getElementById('back-to-inbox');

			const emailSubjectEl = document.getElementById('email-subject');
			const emailSenderEl = document.getElementById('email-sender');
			const emailTimestampEl = document.getElementById('email-timestamp');
			const emailBodyEl = document.getElementById('email-body');

			// --- State ---
			let state = {
				emails: [],
				currentEmail: null,
				selectedEmailId: null,
				isMobileView: window.innerWidth < 1024,
				signalRConnection: null,
			};

			// --- Config ---
			const API_BASE_URL = '';
			const SIGNALR_HUB_URL = `${API_BASE_URL}/email/hub`;

			// --- Main Logic Functions ---

			async function handleSelectEmail() {
				const emailToTrack = currentEmailEl.value.trim();
				if (!emailToTrack || emailToTrack === state.currentEmail) {
					return;
				}

				if (state.currentEmail) {
					await unsubscribe(state.currentEmail);
				}

				state.currentEmail = emailToTrack;
				deleteAllEmailsOnUI();

				await fetchInitialEmails(state.currentEmail);
				await subscribe(state.currentEmail);
			}

			async function fetchInitialEmails(emailAddress) {
				try {
					const response = await fetch(`${API_BASE_URL}/email?to=${emailAddress}`);
					if (!response.ok) throw new Error(`Lỗi mạng: ${response.statusText}`);

					const apiResponse = await response.json();
					if (apiResponse.Code !== 0 || !apiResponse.Data) throw new Error(`Lỗi API: ${apiResponse.Msg}`);

					// MODIFIED: Map email data including the body
					const backendEmails = apiResponse.Data.map(beEmail => ({
						id: beEmail.Id,
						from: beEmail.From,
						subject: beEmail.Subject,
						body: beEmail.HtmlBody || beEmail.TextBody,
						timestamp: new Date(beEmail.RecvDate).getTime(),
						read: false,
						isNew: false,
					}));

					state.emails = backendEmails;
					renderInbox();

				} catch (error) {
					console.error('Không thể lấy email ban đầu:', error);
				}
			};

			// --- UI Rendering Functions ---

			const renderInbox = () => {
				inboxListEl.innerHTML = '';
				inboxCountEl.textContent = state.emails.length;

				if (state.emails.length === 0) {
					emptyInboxPlaceholder.style.display = 'flex';
				} else {
					emptyInboxPlaceholder.style.display = 'none';
					state.emails.sort((a, b) => b.timestamp - a.timestamp).forEach(email => {
						const isSelected = email.id === state.selectedEmailId;
						const emailDiv = document.createElement('div');
						emailDiv.className = `email-item p-3 rounded-lg cursor-pointer transition-colors duration-200 border-l-4 ${email.read ? 'border-transparent' : 'border-blue-500'
							} ${isSelected
								? 'bg-blue-100 dark:bg-blue-900/50'
								: 'hover:bg-gray-100 dark:hover:bg-gray-700/50'
							}`;
						if (email.isNew) {
							emailDiv.classList.add('email-item-new');
							setTimeout(() => email.isNew = false, 500);
						}
						emailDiv.dataset.id = email.id;

						// MODIFIED: Use `email.from` array
						emailDiv.innerHTML = `
										<div class="flex justify-between items-start">
											<p class="font-semibold text-sm truncate pr-2">${email.from}</p>
											<span class="text-xs text-gray-400 dark:text-gray-500 flex-shrink-0">${getTimeAgo(email.timestamp)}</span>
										</div>
										<p class="text-sm truncate text-gray-600 dark:text-gray-300">${email.subject}</p>
									`;
						inboxListEl.appendChild(emailDiv);
					});
				}
			};

			function showEmailContent(emailId) {
				const email = state.emails.find(e => e.id === emailId);
				if (!email) return;

				state.selectedEmailId = emailId;
				email.read = true;

				// MODIFIED: Directly use properties from the email object
				emailSubjectEl.textContent = email.subject;
				emailSenderEl.textContent = email.from;
				emailTimestampEl.textContent = new Date(email.timestamp).toLocaleString('vi-VN');
				emailBodyEl.innerHTML = email.body || 'Không có nội dung.';

				emptyContentPlaceholder.style.display = 'none';
				emailContentView.style.display = 'flex';

				if (state.isMobileView) {
					leftPanel.classList.add('view-hidden');
					contentPanel.classList.remove('view-hidden');
				}

				renderInbox();
			};

			const deleteAllEmailsOnUI = () => {
				state.emails = [];
				state.selectedEmailId = null;
				renderInbox();
				showInboxList();
			};

			const showInboxList = () => {
				state.selectedEmailId = null;
				emailContentView.style.display = 'none';
				emptyContentPlaceholder.style.display = 'flex';

				if (state.isMobileView) {
					leftPanel.classList.remove('view-hidden');
					contentPanel.classList.add('view-hidden');
				}
				const activeEmail = document.querySelector('.email-item.bg-blue-100');
				if (activeEmail) {
					activeEmail.classList.remove('bg-blue-100', 'dark:bg-blue-900/50');
				}
			};

			// --- SignalR Functions ---

			async function initSignalR() {
				state.signalRConnection = new signalR.HubConnectionBuilder()
					.withUrl(SIGNALR_HUB_URL)
					.withAutomaticReconnect()
					.build();

				// MODIFIED: SignalR handler now includes the email body
				state.signalRConnection.on("ReceiveEmail", (newMail) => {

					state.emails.unshift({
						id: newMail.Id,
						from: newMail.From,
						subject: newMail.Subject,
						body: newMail.HtmlBody || newMail.TextBody,
						timestamp: new Date(newMail.RecvDate).getTime(),
						read: false,
						isNew: true,
					});
					renderInbox();

				});

				state.signalRConnection.onreconnected(async (connectionId) => {
					console.log(`SignalR đã kết nối lại với ID: ${connectionId}. Đang đăng ký lại...`);
					if (state.currentEmail) {
						await subscribe(state.currentEmail);
					}
				});

				state.signalRConnection.onclose(async () => console.log('SignalR đã ngắt kết nối.'));

				try {
					await state.signalRConnection.start();
					console.log("SignalR đã kết nối và sẵn sàng.");
				} catch (err) {
					console.error("Không thể kết nối SignalR: ", err);
					setTimeout(initSignalR, 5000);
				}
			}

			async function subscribe(email) {
				if (state.signalRConnection?.state === signalR.HubConnectionState.Connected) {
					try {
						await state.signalRConnection.invoke("Subscribe", email);
						console.log(`Đã đăng ký nhận email cho: ${email}`);
					} catch (err) {
						console.error(`Đăng ký SignalR thất bại cho ${email}: `, err);
					}
				}
			}

			async function unsubscribe(email) {
				if (state.signalRConnection?.state === signalR.HubConnectionState.Connected) {
					try {
						await state.signalRConnection.invoke("Unsubscribe", email);
						console.log(`Đã hủy đăng ký nhận email cho: ${email}`);
					} catch (err) {
						console.error(`Hủy đăng ký SignalR thất bại cho ${email}: `, err);
					}
				}
			}

			// --- Helper Functions & Event Listeners ---
			const getTimeAgo = (timestamp) => {
				const now = new Date();
				const seconds = Math.floor((now - new Date(timestamp)) / 1000);
				if (seconds < 60) return `${seconds} giây`;
				const minutes = Math.floor(seconds / 60);
				if (minutes < 60) return `${minutes} phút`;
				const hours = Math.floor(minutes / 60);
				if (hours < 24) return `${hours} giờ`;
				const days = Math.floor(hours / 24);
				return `${days} ngày`;
			};

			const handleResize = () => { /* no changes */ };

			themeToggle.addEventListener('click', () => document.documentElement.classList.toggle('dark'));
			selectEmailButton.addEventListener('click', handleSelectEmail);
			currentEmailEl.addEventListener('keydown', (e) => {
				if (e.key === 'Enter') {
					handleSelectEmail();
				}
			});
			inboxListEl.addEventListener('click', (e) => {
				const emailItem = e.target.closest('.email-item');
				if (emailItem) {
					showEmailContent(emailItem.dataset.id);
				}
			});
			backToInboxBtn.addEventListener('click', showInboxList);
			window.addEventListener('resize', handleResize);

			// --- Initialization ---
			const init = async () => {
				lucide.createIcons();
				handleResize();
				await initSignalR();
			};

			init();
		});
	</script>
</body>
</html>
